# Development stack: Postgres, Redis, a self-hosted bundler, and the paymaster backend.
#
# td2.md asks for Docker Compose for development and Kubernetes/Helm for production. This is the
# former. It is NOT a production deployment: it uses trust auth, no TLS, no resource limits, and
# a dev signing key. See docs/ for the production path.
#
# The bundler is Rundler, Alchemy's ERC-4337 bundler, open source under Apache-2.0/MIT. td2.md
# prohibits the Alchemy *hosted* bundler service; this runs the open-source binary on our own
# infrastructure, which td2.md calls "acceptable and preferred". No request leaves this stack.

name: paymaster

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paymaster
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: paymaster
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # `pg_isready` alone reports the postmaster up before it accepts queries; the -d flag makes
      # it check the database the backend will actually connect to.
      test: ["CMD-SHELL", "pg_isready -U paymaster -d paymaster"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    # appendonly on: quota counters are not precious, but losing them all at once hands every
    # caller a fresh quota, which is a spend event rather than a data-loss event.
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  # A local chain for development. In a real deployment this is replaced by RPC endpoints in the
  # CHAINS config; nothing else in the stack changes.
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337", "--silent"]
    ports:
      - "127.0.0.1:8545:8545"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          cast block-number --rpc-url http://127.0.0.1:8545 > /dev/null 2>&1
      interval: 2s
      timeout: 3s
      retries: 30

  bundler:
    image: alchemyplatform/rundler:v0.11.0
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      # Rundler's chain spec pins the EntryPoint per version. For a real chain, drop CHAIN_SPEC and
      # set NETWORK (ethereum, base, arbitrum, ...) — the canonical v0.7 EntryPoint is the same
      # address on every chain, which is what makes chain onboarding configuration-only.
      CHAIN_SPEC: /config/chain.toml
      NODE_HTTP: http://anvil:8545
      ENABLED_ENTRY_POINTS: v0.7
      RPC_PORT: "3001"
      RPC_HOST: 0.0.0.0
      METRICS_PORT: "8081"
      # The EOA that submits bundles. Needs native balance. In production this is a KMS key
      # (rundler supports --signer.aws_kms_key_ids), never an inline private key.
      SIGNER_PRIVATE_KEYS: ${BUNDLER_SIGNER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      # UNSAFE is deliberately NOT set. Safe mode enforces the ERC-7562 storage rules, which is
      # what requires our paymaster to be staked. Running unsafe here would hide a misconfiguration
      # that every production bundler would then reject.
    command: ["node"]
    volumes:
      - ./deploy/rundler:/config:ro
    ports:
      - "127.0.0.1:3001:3001"
      - "127.0.0.1:8081:8081"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget -qO- --post-data='{"jsonrpc":"2.0","id":1,"method":"eth_chainId","params":[]}'
          --header='Content-Type: application/json' http://127.0.0.1:3001 | grep -q result
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      DATABASE_URL: postgresql://paymaster:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/paymaster
      REDIS_URL: redis://redis:6379
      # No defaults for either: the service must refuse to start rather than invent a signing key
      # or run unauthenticated. Generate with `npm run key:generate` in backend/.
      SPONSORSHIP_SIGNER_KEY: "${SPONSORSHIP_SIGNER_KEY:?set SPONSORSHIP_SIGNER_KEY in .env}"
      BOOTSTRAP_API_KEY: "${BOOTSTRAP_API_KEY:?set BOOTSTRAP_API_KEY in .env - generate one with npm run key:generate}"
      CHAINS: "${CHAINS:?set CHAINS in .env - see backend/.env.example}"
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
