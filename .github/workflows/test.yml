name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv

  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      # The backend's differential suite compares its digest against the real contract: it reads
      # Foundry build artifacts and runs an anvil node. Both come from the toolchain, so this job
      # needs Foundry even though it is testing TypeScript.
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts (produces artifacts the differential tests load)
        run: forge build
        working-directory: contracts

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The bundler integration test needs postgres, redis and the rundler binary. Without them
      # those suites skip rather than fail, so fetch them explicitly — a silently-skipped
      # integration test is worse than no integration test.
      - name: Install PostgreSQL and Redis
        run: sudo apt-get update && sudo apt-get install -y postgresql redis-server

      - name: Fetch bundler (pinned version + checksum)
        run: npm run bundler:fetch --workspace @paymaster/backend

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Test
        run: npm run test --workspaces --if-present

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
